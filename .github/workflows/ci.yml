name: ci

# Quality gate: build, test, and a JSR publish dry-run on every PR and push to
# main. Trust is mechanical — the publish path is validated before a release tag
# is ever cut.

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build (tsc)
        run: bun run build

      - name: Test
        run: bun test

      - name: JSR publish dry-run
        run: bunx jsr publish --dry-run --allow-slow-types
